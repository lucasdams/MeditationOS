[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic migration files are autogenerated; don't lint them.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# pycodestyle errors, pyflakes, import sorting, pyupgrade, bugbear.
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection markers are designed to be called in defaults.
extend-immutable-calls = [
  "fastapi.Depends",
  "fastapi.Query",
  "fastapi.Path",
  "fastapi.Body",
  "fastapi.Header",
  "fastapi.Cookie",
]
