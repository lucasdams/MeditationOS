# Local development stack: frontend (Vite) · backend (FastAPI) · database (Postgres)
# Usage:
#   cp .env.example .env   # then fill in values
#   docker compose up --build
#
# Variables are read from the root .env file (see .env.example).

services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional shared store for the throttles + rate limiter (needed only when running multiple
  # backend workers). Off by default — start it with `docker compose --profile redis up` and set
  # REDIS_URL=redis://redis:6379/0 in .env to activate it. Unset REDIS_URL → in-memory (default).
  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    depends_on:
      database:
        condition: service_healthy # wait for Postgres before starting
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ENVIRONMENT: ${ENVIRONMENT}
      REDIS_URL: ${REDIS_URL:-} # empty → in-memory throttles; set to use the redis service above
      DEV_RELOAD: "1" # local hot-reload; prod entrypoint runs gunicorn workers
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # live-reload source during dev

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # keep container's installed deps, don't mask with host

volumes:
  pgdata:
