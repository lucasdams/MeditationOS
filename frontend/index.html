<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO / discoverability.
         TODO: replace https://meditationos.app with your real production domain
         (here, in robots.txt, and in sitemap.xml) before launch. -->
    <title>MeditationOS — track your meditation practice</title>
    <meta
      name="description"
      content="A meditation app built around your practice data: track sessions, build streaks, breathe with intention (HRV resonance breathing), journal, and watch your progress grow."
    />
    <link rel="canonical" href="https://meditationos.app/" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MeditationOS" />
    <meta property="og:title" content="MeditationOS — track your meditation practice" />
    <meta
      property="og:description"
      content="A meditation app built around your practice data — sessions, streaks, HRV breathing, journaling, and progress analytics."
    />
    <meta property="og:url" content="https://meditationos.app/" />
    <meta property="og:image" content="https://meditationos.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MeditationOS — track your meditation practice" />
    <meta
      name="twitter:description"
      content="A meditation app built around your practice data — sessions, streaks, HRV breathing, journaling, and progress analytics."
    />
    <meta name="twitter:image" content="https://meditationos.app/og-image.png" />

    <!-- Google Identity Services (Sign in with Google). No-op unless a client ID is set. -->
    <script src="https://accounts.google.com/gsi/client" async></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
