<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MeditationOS">
  <!-- The breath orb — the app's signature visual (the breathing pacer), on the Cool Electric
       violet. Concentric rings read as a breath mid-expansion; a single calm mark at any size. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c6dff" />
      <stop offset="1" stop-color="#5847f0" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <circle cx="32" cy="32" r="19" fill="#ffffff" opacity="0.16" />
  <circle cx="32" cy="32" r="13" fill="#ffffff" opacity="0.34" />
  <circle cx="32" cy="32" r="7.5" fill="#ffffff" opacity="0.95" />
</svg>
