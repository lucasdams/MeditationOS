# Serves the built Vite SPA as static files, with client-side routing fallback to index.html.
# Used by Dockerfile.prod (the production frontend image).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets — safe to cache aggressively (a new build → new filenames).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing: any unmatched path falls back to index.html so React Router handles it,
    # instead of nginx returning 404 on a deep-linked client route (e.g. /spirit).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell — it must always fetch the latest asset references.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
